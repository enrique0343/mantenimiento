name = "mantenimiento"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "mantenimiento-db"
database_id = "a4a8b34e-6b56-42b5-a393-ca5a43fcb38a"

[[r2_buckets]]
binding = "R2"
bucket_name = "mantenimiento-files"

# Variables de entorno: configuradas como secrets en el proyecto Pages
# JWT_SECRET y BASE_URL se agregan via: wrangler pages secret put
